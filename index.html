<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
  <title>MI NORTE</title>
  <meta name="description" content="Tus finanzas, con claridad. Ingresos, gastos y resúmenes en un solo lugar." />
  <meta name="theme-color" content="#0b0d12" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png" />
  <link rel="icon" type="image/png" sizes="512x512" href="icons/icon-512.png" />

  <!-- iOS: comportarse como app y mostrar ícono al "Añadir a pantalla de inicio" -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="MI NORTE" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />

  <!-- Tema aplicado antes del CSS para evitar parpadeo (espejo en localStorage) -->
  <script>try{var t=localStorage.getItem('mn_theme');document.documentElement.setAttribute('data-theme',t==='light'?'light':'dark');}catch(e){}</script>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">
    <!-- Pantalla activa -->
    <main id="screen" class="screen"></main>

    <!-- Barra de pestañas inferior -->
    <nav id="tabbar" class="tabbar" aria-label="Secciones">
      <button class="tab" data-tab="home" aria-label="Resumen">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M3.5 12.5 12 5l8.5 7.5"/><path d="M5.5 11v8.5h13V11"/><path d="M10 19.5v-5h4v5"/></svg>
        <span>Resumen</span></button>
      <button class="tab" data-tab="money" aria-label="Movimientos">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"><rect x="3" y="6" width="18" height="12.5" rx="2.6"/><path d="M3 10h18"/><circle cx="16.6" cy="14.3" r="1.25" fill="currentColor" stroke="none"/></svg>
        <span>Movimientos</span></button>
      <button class="tab" data-tab="reports" aria-label="Reportes">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a9 9 0 1 0 9 9h-9Z"/><path d="M12 3v9h9"/><path d="M12 3a9 9 0 0 1 9 9"/></svg>
        <span>Reportes</span></button>
      <button class="tab" data-tab="more" aria-label="Más">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="4" width="7" height="7" rx="2"/><rect x="13" y="4" width="7" height="7" rx="2"/><rect x="4" y="13" width="7" height="7" rx="2"/><rect x="13" y="13" width="7" height="7" rx="2"/></svg>
        <span>Más</span></button>
      <button class="tab" data-tab="settings" aria-label="Ajustes">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="12" cy="12" r="3.2"/><path d="M12 2.5v3M12 18.5v3M2.5 12h3M18.5 12h3M5.2 5.2l2.1 2.1M16.7 16.7l2.1 2.1M18.8 5.2l-2.1 2.1M5.2 18.8l2.1-2.1" stroke-linecap="round"/></svg>
        <span>Ajustes</span></button>
    </nav>
  </div>

  <!-- Capa para hojas/modales -->
  <div id="sheet-root"></div>

  <script src="app.js"></script>
</body>
</html>
